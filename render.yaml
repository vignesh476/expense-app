services:
  - type: web
    name: expense-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: backend
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_ENV
        value: "production"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://expense-frontend.onrender.com"
      - key: EMAIL_FROM
        value: "no-reply@example.com"
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
    buildCommand: ""
    startCommand: ""

  - type: static
    name: expense-frontend
    runtime: static
    buildCommand: cd expense-ui && npm install && npm run build
    staticPublishPath: ./expense-ui/build
    envVars:
      - key: REACT_APP_API_URL
        value: "https://expense-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: expense-db
    databaseName: expense_tracker
    user: expense_user
    plan: free

